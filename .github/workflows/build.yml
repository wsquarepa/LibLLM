name: Build

on:
  push:
    paths:
      - 'libllm/**'
      - 'client/**'
      - 'backup/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  clippy:
    runs-on: ubuntu-latest
    name: clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    needs: [test, clippy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set channel
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "LIBLLM_CHANNEL=stable" >> "$GITHUB_ENV"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "LIBLLM_CHANNEL=${BRANCH}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Rename binaries
        shell: bash
        run: |
          for pair in "client:libllm"; do
            cargo_name="${pair%%:*}"
            release_name="${pair##*:}"
            src="target/${{ matrix.target }}/release/${cargo_name}"
            if [[ -f "${src}.exe" ]]; then
              mv "${src}.exe" "${release_name}-${{ matrix.target }}.exe"
            elif [[ -f "${src}" ]]; then
              mv "${src}" "${release_name}-${{ matrix.target }}"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: |
            libllm-${{ matrix.target }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release params
        id: params
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          {
            echo "Changes this release:"
            echo ""
            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]] \
              || ! git rev-parse --verify --quiet "${BEFORE_SHA}^{commit}" >/dev/null; then
              git log -1 --format="- [%h](${REPO_URL}/commit/%H) %s" HEAD
            else
              git log --format="- [%h](${REPO_URL}/commit/%H) %s" "${BEFORE_SHA}..HEAD"
            fi
          } > notes.md

          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "tag=stable" >> "$GITHUB_OUTPUT"
            echo "title=Stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            if [[ "$BRANCH" == "stable" ]]; then
              echo "::error::Branch name 'stable' is reserved for the master release channel"
              exit 1
            fi
            echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "title=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.params.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.params.outputs.tag }}"
          PRERELEASE="${{ steps.params.outputs.prerelease }}"
          TITLE="${{ steps.params.outputs.title }}"

          FLAGS=(--target "$GITHUB_SHA" --title "$TITLE" --notes-file notes.md)
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--prerelease)
          else
            FLAGS+=(--latest)
          fi

          gh release create "$TAG" artifacts/* "${FLAGS[@]}"
