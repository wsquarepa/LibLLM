name: Build

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set channel
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "LIBLLM_CHANNEL=stable" >> "$GITHUB_ENV"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "LIBLLM_CHANNEL=${BRANCH}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/libllm"
          if [[ -f "$src.exe" ]]; then
            mv "$src.exe" "libllm-${{ matrix.target }}.exe"
          else
            mv "$src" "libllm-${{ matrix.target }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: libllm-${{ matrix.target }}
          path: libllm-${{ matrix.target }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release params
        id: params
        shell: bash
        run: |
          HASH=$(git rev-parse --short HEAD)
          TIME=$(git log -1 --format=%ci)
          MSG=$(git log -1 --format=%B | sed '/^$/d')
          printf -v NOTES 'Commit `%s` at `%s`\n\n```\n%s\n```' "$HASH" "$TIME" "$MSG"

          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "tag=stable" >> "$GITHUB_OUTPUT"
            echo "title=Stable Build" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "title=Branch: ${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "notes<<NOTES_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "NOTES_EOF" >> "$GITHUB_OUTPUT"

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.params.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.params.outputs.tag }}"
          PRERELEASE="${{ steps.params.outputs.prerelease }}"
          TITLE="${{ steps.params.outputs.title }}"

          FLAGS=(--target "$GITHUB_SHA" --title "$TITLE" --notes "${{ steps.params.outputs.notes }}")
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" artifacts/* "${FLAGS[@]}"
