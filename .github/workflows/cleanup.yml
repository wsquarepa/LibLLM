name: Cleanup

on:
  delete:

jobs:
  remove-release:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Delete branch release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.event.ref }}"
          if gh release view "$BRANCH" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete "$BRANCH" --repo "${{ github.repository }}" --yes --cleanup-tag
            echo "Deleted release for branch: $BRANCH"
          else
            echo "No release found for branch: $BRANCH"
          fi
