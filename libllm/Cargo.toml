[package]
name = "libllm"
version = "1.0.0"
edition = "2024"

[dependencies]
libllm-core = { path = "../libllm-core" }
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["stream", "json", "rustls-tls", "charset", "http2", "system-proxy"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
futures-util = "0.3"
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
crossterm = { version = "0.29", features = ["event-stream"] }
tui-textarea-2 = "0.10"
rpassword = "5"
arboard = "3"
time = { version = "0.3", features = ["formatting", "local-offset", "macros"] }
uuid = { version = "1.23.0", features = ["v4"] }

[dev-dependencies]
libllm-core = { path = "../libllm-core", features = ["test-support"] }
tempfile = "3.27.0"
